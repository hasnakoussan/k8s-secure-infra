global:
  domain: argocd.local

server:
  service:
    type: NodePort
    nodePortHttp: 30080
    nodePortHttps: 30443

  extraArgs:
    - --insecure   # HTTP ok en local

configs:
  params:
    server.insecure: true

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

controller:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
